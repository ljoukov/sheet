name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (for example v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG_NAME }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Tool versions
        run: |
          node --version
          npm --version

      - run: npm ci

      - name: Validate tag matches package.json version
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${TAG_NAME}" != v* ]]; then
            echo "Tag '${TAG_NAME}' must start with 'v' (for example v${PACKAGE_VERSION})."
            exit 1
          fi
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag '${TAG_NAME}' does not match package.json version '${PACKAGE_VERSION}'."
            exit 1
          fi

      - run: npm run verify
      - run: npm publish
